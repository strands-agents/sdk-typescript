name: Python Check

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string

jobs:
  py-check:
    name: Python (ruff + pyright + generated-up-to-date)
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bootstrap strandly + venv
        run: |
          npm ci
          npm link -w strandly
          python -m venv .venv
          .venv/bin/pip install -e .
          .venv/bin/pip install -e strands-py-wasm

      - name: strandly check --py
        run: strandly check --py
